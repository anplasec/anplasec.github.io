<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANPLASEC - Análise e Planejamento de Cibersegurança</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0d0d0d 0%, #0d1a2e 30%, #1b2d4e 70%, #0e3a4a 100%);
            color: #ffffff;
            overflow-x: hidden;
            padding-bottom: 34px;
        }

        /* ===================== NAVBAR ===================== */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            color: #00d9ff;
            text-shadow:
                0 0 10px rgba(0, 217, 255, 0.8),
                0 0 20px rgba(0, 217, 255, 0.6),
                0 0 30px rgba(0, 217, 255, 0.4);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            animation: logoShake 8s ease-in-out infinite;
        }

        .logo-cursor {
            display: inline-block;
            animation: blink 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
                transform: scaleY(1);
                text-shadow:
                    0 0 15px rgba(0, 255, 255, 1),
                    0 0 25px rgba(0, 255, 255, 0.8),
                    0 0 35px rgba(0, 255, 255, 0.6);
            }
            50% {
                opacity: 0.3;
                transform: scaleY(0.95);
                text-shadow:
                    0 0 5px rgba(0, 255, 255, 0.5),
                    0 0 10px rgba(0, 255, 255, 0.3);
            }
        }

        @keyframes logoShake {
            0%, 90%, 100% { transform: translate(0, 0); }
            91% { transform: translate(-2px, 1px); }
            92% { transform: translate(2px, -1px); }
            93% { transform: translate(-1px, 2px); }
            94% { transform: translate(1px, -2px); }
            95% { transform: translate(-2px, -1px); }
            96% { transform: translate(2px, 1px); }
            97% { transform: translate(-1px, -1px); }
            98% { transform: translate(1px, 1px); }
            99% { transform: translate(0, 0); }
        }

        /* ===================== NAV GAMIFICADO ===================== */
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-item {
            cursor: pointer;
            position: relative;
            user-select: none;
            width: 110px;
            background: linear-gradient(160deg, rgba(5,15,30,0.95) 0%, rgba(0,30,45,0.9) 100%);
            border: 1px solid rgba(0,217,255,0.2);
            border-radius: 0;
            clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
            padding: 12px 8px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        /* corner accent */
        .nav-item::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 10px; height: 10px;
            background: rgba(0,217,255,0.3);
            clip-path: polygon(0 0, 100% 0, 100% 100%);
            transition: background 0.3s ease;
        }

        /* scan sweep */
        .nav-item::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,217,255,0.1), transparent);
            transition: left 0s;
        }

        .nav-item:hover::after,
        .nav-item.focused::after {
            left: 200%;
            transition: left 0.6s ease;
        }

        .nav-item-icon {
            font-size: 26px;
            line-height: 1;
            filter: drop-shadow(0 0 6px rgba(0,217,255,0.3));
            transition: all 0.3s ease;
        }

        .nav-item-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            transition: all 0.3s ease;
            text-align: center;
            line-height: 1.3;
        }

        .nav-item-sub {
            font-size: 8px;
            color: rgba(0,217,255,0.35);
            letter-spacing: 0.5px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
        }

        /* status bar bottom */
        .nav-item-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d9ff, transparent);
            transform: scaleX(0);
            transition: transform 0.35s ease;
        }

        .nav-item:hover .nav-item-bar,
        .nav-item.focused .nav-item-bar,
        .nav-item.active .nav-item-bar {
            transform: scaleX(1);
        }

        .nav-item:hover,
        .nav-item.focused {
            border-color: rgba(0,217,255,0.6);
            background: linear-gradient(160deg, rgba(0,20,40,0.98) 0%, rgba(0,50,70,0.9) 100%);
            box-shadow: 0 0 20px rgba(0,217,255,0.2), inset 0 0 20px rgba(0,217,255,0.04);
            transform: translateY(-3px);
        }

        .nav-item:hover::before,
        .nav-item.focused::before {
            background: rgba(0,217,255,0.7);
        }

        .nav-item:hover .nav-item-icon,
        .nav-item.focused .nav-item-icon {
            filter: drop-shadow(0 0 12px rgba(0,255,255,0.8));
            transform: scale(1.15);
        }

        .nav-item:hover .nav-item-label,
        .nav-item.focused .nav-item-label {
            color: #00d9ff;
        }

        .nav-item:hover .nav-item-sub,
        .nav-item.focused .nav-item-sub {
            color: rgba(0,217,255,0.7);
        }

        .nav-item.active {
            border-color: #00d9ff;
            background: linear-gradient(160deg, rgba(0,30,55,0.98) 0%, rgba(0,60,80,0.95) 100%);
            box-shadow: 0 0 30px rgba(0,217,255,0.35), inset 0 0 25px rgba(0,217,255,0.08);
            transform: translateY(-3px);
        }

        .nav-item.active::before {
            background: #00ffff;
        }

        .nav-item.active .nav-item-icon {
            filter: drop-shadow(0 0 14px rgba(0,255,255,1));
            animation: iconPulse 2s ease-in-out infinite;
        }

        .nav-item.active .nav-item-label {
            color: #00ffff;
            text-shadow: 0 0 8px rgba(0,255,255,0.6);
        }

        .nav-item.active .nav-item-sub {
            color: rgba(0,255,255,0.6);
        }

        @keyframes iconPulse {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(0,255,255,0.8)); }
            50% { filter: drop-shadow(0 0 18px rgba(0,255,255,1)) drop-shadow(0 0 30px rgba(0,200,255,0.5)); }
        }

        .nav-hint {
            font-size: 9px;
            color: rgba(0,217,255,0.3);
            letter-spacing: 1.5px;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin-top: 4px;
        }

        /* ===================== FOOTER ===================== */
        .site-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 998;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(0,217,255,0.15);
            padding: 7px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .site-footer span {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            color: rgba(0,217,255,0.35);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .site-footer .footer-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: rgba(0,217,255,0.3);
        }

        /* ===================== TOOLTIP ===================== */
        .satellite-tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00d9ff;
            border-radius: 6px;
            padding: 8px 14px;
            color: #00d9ff;
            font-size: 13px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s ease;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.4);
            white-space: nowrap;
        }

        .satellite-tooltip.visible {
            opacity: 1;
        }

        /* ===================== CANVAS ===================== */
        .canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: default;
        }

        #globeCanvas {
            display: block;
            background: transparent;
            width: 100%;
            height: 100%;
        }

        /* ===================== OVERLAY ===================== */
        .content-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
            backdrop-filter: blur(12px);
            padding: 20px;
            overflow-y: auto;
        }

        .content-panel {
            background: linear-gradient(135deg, rgba(13, 26, 46, 0.97) 0%, rgba(14, 58, 74, 0.97) 100%);
            border: 1px solid #00d9ff;
            border-radius: 15px;
            padding: 40px;
            max-width: 820px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 60px rgba(0, 217, 255, 0.4), inset 0 0 40px rgba(0,0,0,0.3);
            position: relative;
            margin: auto;
            animation: panelIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes panelIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Scrollbar */
        .content-panel::-webkit-scrollbar { width: 5px; }
        .content-panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 5px; }
        .content-panel::-webkit-scrollbar-thumb { background: #00d9ff; border-radius: 5px; }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0,217,255,0.08);
            border: 1px solid rgba(0,217,255,0.3);
            color: #00d9ff;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(0,217,255,0.25);
            transform: rotate(90deg) scale(1.15);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        /* ===================== CONTENT TYPOGRAPHY ===================== */
        .content-panel h2 {
            color: #00d9ff;
            margin-bottom: 20px;
            font-size: 26px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
            letter-spacing: 1px;
        }

        .content-panel h1 {
            color: #00d9ff;
            margin-bottom: 25px;
            font-size: 22px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
            letter-spacing: 1px;
        }

        .content-panel p {
            line-height: 1.8;
            margin-bottom: 15px;
            color: #d0e8f0;
            font-size: 15px;
        }

        .content-panel ul {
            list-style: none;
            padding-left: 0;
            margin-top: 10px;
        }

        .content-panel li {
            margin-bottom: 28px;
            padding-left: 18px;
            border-left: 3px solid #00d9ff;
        }

        .content-panel li h3 {
            color: #00ffff;
            font-size: 20px;
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ===================== SECTION DIVIDER ===================== */
        .section-divider {
            border: none;
            border-top: 1px solid rgba(0,217,255,0.25);
            margin: 30px 0;
        }

        /* ===================== SERVICE CARDS ===================== */
        .service-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 24px 0;
        }

        .service-card {
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(0,217,255,0.25);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .service-card:hover {
            border-color: #00d9ff;
            box-shadow: 0 6px 24px rgba(0,217,255,0.2);
        }

        .service-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            user-select: none;
        }

        .service-card-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .service-card h4 {
            color: #00ffff;
            font-size: 13px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex: 1;
        }

        .service-card-arrow {
            color: #00d9ff;
            font-size: 12px;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .service-card.open .service-card-arrow {
            transform: rotate(180deg);
        }

        .service-card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            padding: 0 18px;
        }

        .service-card.open .service-card-body {
            max-height: 300px;
            padding: 0 18px 16px 18px;
        }

        .service-card-body p {
            font-size: 13px;
            color: #a8c8d8;
            line-height: 1.7;
            margin-bottom: 0;
        }

        /* ===================== HIGHLIGHT BOX ===================== */
        .highlight-box {
            background: rgba(0,217,255,0.07);
            border: 1px solid rgba(0,217,255,0.3);
            border-radius: 10px;
            padding: 18px 22px;
            margin: 20px 0;
        }

        .highlight-box p {
            color: #b0dae8;
            margin-bottom: 0;
            font-size: 14px;
        }

        .highlight-box strong {
            color: #00ffff;
        }

        /* ===================== STAT BADGES ===================== */
        .stat-row {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .stat-badge {
            flex: 1;
            min-width: 120px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,217,255,0.3);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .stat-badge .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: #00d9ff;
            text-shadow: 0 0 10px rgba(0,217,255,0.6);
        }

        .stat-badge .stat-label {
            font-size: 11px;
            color: #7aabbf;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===================== FORM STYLES ===================== */
        .content-panel form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .content-panel label {
            color: #00d9ff;
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .content-panel input,
        .content-panel select,
        .content-panel textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0,217,255,0.4);
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .content-panel input:focus,
        .content-panel select:focus,
        .content-panel textarea:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.35);
            background: rgba(0,0,0,0.7);
        }

        .content-panel textarea {
            min-height: 120px;
            resize: vertical;
            font-family: 'Arial', sans-serif;
        }

        .content-panel select {
            cursor: pointer;
        }

        .content-panel select option {
            background: #0d1a2e;
            color: #ffffff;
        }

        .content-panel button[type="submit"] {
            background: linear-gradient(135deg, #00d9ff 0%, #00ffff 100%);
            color: #0d0d0d;
            border: none;
            padding: 15px 30px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-family: 'Orbitron', sans-serif;
        }

        .content-panel button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 217, 255, 0.6);
        }

        .content-panel input::placeholder,
        .content-panel textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* ===================== LOADING ===================== */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d9ff;
            font-size: 16px;
            z-index: 9999;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        .spinner {
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-top: 2px solid #00ffff;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===================== RESPONSIVE ===================== */
        @media (max-width: 768px) {
            .logo { font-size: 22px; }

            .nav-menu {
                flex-direction: column;
                gap: 5px;
                width: 100%;
            }

            .nav-item {
                width: 100%;
                text-align: center;
                padding: 12px 15px;
            }

            .canvas-container {
                height: 100vh;
                height: 100dvh;
            }

            #globeCanvas {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
            }

            .content-overlay {
                padding: 10px;
                align-items: flex-start;
                padding-top: 10px;
            }

            .content-panel {
                margin-top: 10px;
                margin-bottom: 10px;
                padding: 60px 20px 20px 20px;
                max-height: calc(100vh - 20px);
                max-height: calc(100dvh - 20px);
                border-radius: 10px;
            }

            .service-cards {
                grid-template-columns: 1fr;
            }

            .close-btn {
                top: 12px;
                right: 12px;
            }

            .content-panel h2 { font-size: 20px; }
            .content-panel h1 { font-size: 18px; }
            .content-panel li h3 { font-size: 16px; }
        }

        @media (max-width: 480px) {
            .content-panel { padding: 50px 15px 15px 15px; }
        }
    </style>
</head>
<body>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        Carregando...
    </div>

    <!-- Tooltip flutuante para satélites -->
    <div class="satellite-tooltip" id="satelliteTooltip"></div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span>></span><span>ANPLASEC</span><span class="logo-cursor">_</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item" data-section="sobre">
                    <div class="nav-item-icon">🛡️</div>
                    <div class="nav-item-label">Sobre Nós</div>
                    <div class="nav-item-sub">QUEM SOMOS</div>
                    <div class="nav-item-bar"></div>
                </li>
                <li class="nav-item" data-section="servicos">
                    <div class="nav-item-icon">⚔️</div>
                    <div class="nav-item-label">Serviços</div>
                    <div class="nav-item-sub">O QUE FAZEMOS</div>
                    <div class="nav-item-bar"></div>
                </li>
                <li class="nav-item" data-section="orcamento">
                    <div class="nav-item-icon">📡</div>
                    <div class="nav-item-label">Orçamento</div>
                    <div class="nav-item-sub">FALE CONOSCO</div>
                    <div class="nav-item-bar"></div>
                </li>
            </ul>
            <div class="nav-hint">[ passe o mouse para selecionar · clique para conectar ]</div>
        </div>
    </nav>

    <div class="canvas-container">
        <canvas id="globeCanvas"></canvas>
    </div>

    <div class="content-overlay" id="contentOverlay">
        <div class="content-panel" id="contentPanel">
            <button class="close-btn" id="closeBtn">&times;</button>
            <div id="contentBody"></div>
        </div>
    </div>

    <footer class="site-footer">
        <span>© <span id="footerYear"></span> ANPLASEC</span>
        <div class="footer-dot"></div>
        <span>Todos os direitos reservados</span>
        <div class="footer-dot"></div>
        <span>Florianópolis · SC · Brasil</span>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ============================================================
        // VARIÁVEIS GLOBAIS
        // ============================================================
        let scene, camera, renderer, globe, earthGroup;
        let satellites = [], antennas = [], connections = [], antennaPulses = [];
        let isRotating = true;
        let currentSection = null;
        let raycaster, mouse;
        const GLOBE_RADIUS = 4;

        let beamTravelerAnimationProgress = 0;

        // ============================================================
        // SATÉLITES (3 seções)
        // ============================================================
        function createSatellites() {
            const sections = ['sobre', 'servicos', 'orcamento'];
            const ORBIT_RADIUS = 8;

            for (let i = 0; i < sections.length; i++) {
                const points = [];
                const colors = [];
                for (let j = 0; j < 300; j++) {
                    const vertex = new THREE.Vector3();
                    vertex.x = (Math.random() - 0.5) * 2;
                    vertex.y = (Math.random() - 0.5) * 2;
                    vertex.z = (Math.random() - 0.5) * 2;
                    vertex.normalize();
                    vertex.multiplyScalar(0.8);
                    points.push(vertex.x, vertex.y, vertex.z);

                    const color = new THREE.Color();
                    if (Math.random() > 0.5) {
                        color.setHSL(0.83, 1.0, 0.65 + Math.random() * 0.2);
                    } else {
                        color.setHSL(0.75, 0.95, 0.6 + Math.random() * 0.25);
                    }
                    colors.push(color.r, color.g, color.b);
                }

                const pointGeometry = new THREE.BufferGeometry();
                pointGeometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
                pointGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

                const satMat = new THREE.PointsMaterial({ size: 0.015, vertexColors: true, transparent: true, opacity: 0.8 });
                const satellite = new THREE.Points(pointGeometry, satMat);

                const initialAngle = (i / sections.length) * Math.PI * 2;
                satellite.position.x = Math.cos(initialAngle) * ORBIT_RADIUS;
                satellite.position.y = Math.sin(initialAngle) * ORBIT_RADIUS * 0.3;
                satellite.position.z = Math.sin(initialAngle) * ORBIT_RADIUS;

                satellite.userData = {
                    section: sections[i],
                    initialAngle: initialAngle,
                    orbitRadius: ORBIT_RADIUS,
                    orbitSpeed: 0.12,
                    baseOpacity: 0.8
                };

                // Wireframe do satélite
                const wireframe = new THREE.Mesh(
                    new THREE.SphereGeometry(0.45, 16, 16),
                    new THREE.MeshBasicMaterial({ color: 0x00d9ff, wireframe: true, transparent: true, opacity: 0.2 })
                );
                satellite.add(wireframe);

                // Halo de hover (começa invisível)
                const haloGeo = new THREE.SphereGeometry(0.65, 16, 16);
                const haloMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0 });
                const halo = new THREE.Mesh(haloGeo, haloMat);
                halo.userData.isHalo = true;
                satellite.add(halo);

                satellites.push(satellite);
                scene.add(satellite);
            }
        }

        // ============================================================
        // ANTENAS
        // ============================================================
        function createAntennas() {
            const sections = ['sobre', 'servicos', 'orcamento'];
            const antennaLocations = [
                { lat: 40, lon: -100 },
                { lat: -20, lon: -60 },
                { lat: 50, lon: 10 }
            ];

            for (let i = 0; i < sections.length; i++) {
                const group = new THREE.Group();
                const location = antennaLocations[i];
                const position = latLonToVector3(location.lat, location.lon, GLOBE_RADIUS);
                group.position.copy(position);
                group.lookAt(0, 0, 0);

                const baseMaterial = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff });
                const antenna = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.2, 8), baseMaterial);
                antenna.rotation.x = -Math.PI / 2;
                antenna.position.z = -0.1;
                group.add(antenna);

                const pulseMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
                const pulse = new THREE.Mesh(new THREE.RingGeometry(0.3, 0.4, 32), pulseMaterial);
                pulse.position.z = -0.1;
                group.add(pulse);
                antennaPulses.push(pulse);

                group.userData = { section: sections[i] };
                antennas.push(group);
                earthGroup.add(group);
            }
        }

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = radius * Math.sin(phi) * Math.sin(theta);
            const y = radius * Math.cos(phi);
            return new THREE.Vector3(x, y, z);
        }

        // ILUMINAÇÃO
        // ============================================================
        function setupLighting() {
            scene.add(new THREE.AmbientLight(0x404040, 0.3));
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);

            const pointLight2 = new THREE.PointLight(0x00ffff, 0.5, 20);

        }

        // ============================================================

        // ============================================================
        let navFocusedSection = null;
        let navSatelliteTarget = null; // posição alvo para aproximar satélite

        function focusSatelliteFromNav(section) {
            navFocusedSection = section;
            // Destacar o satélite correspondente
            satellites.forEach(sat => {
                const isTarget = sat.userData.section === section;
                // Halo
                sat.children.forEach(child => {

                        child.material.opacity = isTarget ? 0.6 : 0;
                    }
                });
                // Opacidade
                sat.material.opacity = isTarget ? 1.0 : 0.4;
                // Escala suave — pulsando
                if (isTarget) sat.userData.navFocused = true;
                else sat.userData.navFocused = false;
            });
        }

        function clearNavFocus() {
            navFocusedSection = null;
            satellites.forEach(sat => {
                sat.children.forEach(child => {
                    if (child.userData.isHalo) child.material.opacity = 0;
                });
                sat.material.opacity = 0.8;
                sat.userData.navFocused = false;
            });
        }

        function setupEventListeners() {
            document.querySelectorAll('.nav-item').forEach(item => {
                const section = item.dataset.section;

                item.addEventListener('mouseenter', () => {
                    if (currentSection) return;
                    item.classList.add('focused');
                    focusSatelliteFromNav(section);
                });

                item.addEventListener('mouseleave', () => {
                    item.classList.remove('focused');
                    clearNavFocus();
                });

                item.addEventListener('click', () => {
                    navigateToSection(section);
                });
            });

            document.getElementById('closeBtn').addEventListener('click', () => closeContent());

            window.addEventListener('resize', onWindowResize);

            const canvas = document.getElementById('globeCanvas');
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('click', onMouseClick);
            canvas.addEventListener('mouseleave', () => {
                tooltip.classList.remove('visible');
                if (hoveredSatellite) {
                    setHoverState(hoveredSatellite, false);
                    hoveredSatellite = null;
                }
                canvas.style.cursor = 'default';
            });

            document.getElementById('contentOverlay').addEventListener('click', (event) => {
                if (event.target === document.getElementById('contentOverlay')) {
                    closeContent();
                }
            });
        }

        function setHoverState(satellite, hovered) {
            satellite.children.forEach(child => {
                if (child.userData.isHalo) {
                    child.material.opacity = hovered ? 0.45 : 0;
                }
            });
            satellite.material.opacity = hovered ? 1.0 : 0.8;
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // Hover nos satélites
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(satellites.flatMap(s => [s, ...s.children]), true);

            let found = null;
            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while (obj && !obj.userData.section) obj = obj.parent;
                if (obj && obj.userData.section) found = obj;
            }

            if (found !== hoveredSatellite) {
                if (hoveredSatellite) setHoverState(hoveredSatellite, false);
                hoveredSatellite = found;
                if (hoveredSatellite) setHoverState(hoveredSatellite, true);
            }

            if (hoveredSatellite) {
                document.getElementById('globeCanvas').style.cursor = 'pointer';
                tooltip.textContent = SECTION_LABELS[hoveredSatellite.userData.section] || '';
                tooltip.style.left = (event.clientX + 16) + 'px';
                tooltip.style.top = (event.clientY - 10) + 'px';
                tooltip.classList.add('visible');
            } else {
                document.getElementById('globeCanvas').style.cursor = 'default';
                tooltip.classList.remove('visible');
            }
        }

        function onMouseClick(event) {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(satellites.flatMap(s => [s, ...s.children]), true);
            if (intersects.length > 0) {
                let clickedObject = intersects[0].object;
                while (clickedObject && !clickedObject.userData.section) {
                    clickedObject = clickedObject.parent;
                }
                const section = clickedObject ? clickedObject.userData.section : null;
                if (section) navigateToSection(section);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ============================================================
        // NAVEGAÇÃO

        function navigateToSection(section) {
            isBeamAnimating = false;
            connections.forEach(conn => {
                if (conn.traveler && conn.traveler.parent) scene.remove(conn.traveler);
            });

            if (currentSection === section) {
                if (document.getElementById('contentOverlay').style.display === 'flex') {
                    closeContent();
                }
                return;
            }

            if (document.getElementById('contentOverlay').style.display === 'flex') {
                closeContent(() => _activateSection(section));
            } else {
                _activateSection(section);
            }
        }

        function closeContent(callback) {
            document.getElementById('contentOverlay').style.display = 'none';
            connections.forEach(conn => {
                scene.remove(conn.line);

                isRotating = true;
                currentSection = null;
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                if (finalCallback) finalCallback();
            });
        }

        function _activateSection(sectionToActivate) {
            currentSection = sectionToActivate;
            isRotating = false;

            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.section === sectionToActivate);
            });

            const satellite = satellites.find(s => s.userData.section === sectionToActivate);
            const antenna = antennas.find(a => a.userData.section === sectionToActivate);

            if (satellite && antenna) {
                const targetAntennaWorldPosition = new THREE.Vector3();
                antenna.getWorldPosition(targetAntennaWorldPosition);

                const antennaLocalPosition = earthGroup.worldToLocal(targetAntennaWorldPosition.clone()).normalize();
                const cameraForwardLocal = new THREE.Vector3(0, 0, 1).applyQuaternion(earthGroup.quaternion.clone().invert()).normalize();

                const currentAngle = Math.atan2(cameraForwardLocal.x, cameraForwardLocal.z);
                const targetAngle = Math.atan2(antennaLocalPosition.x, antennaLocalPosition.z);

                let angleToRotate = targetAngle - currentAngle;
                if (angleToRotate > Math.PI) angleToRotate -= 2 * Math.PI;
                if (angleToRotate < -Math.PI) angleToRotate += 2 * Math.PI;

                const startRotationY = earthGroup.rotation.y;
                const rotationDuration = 1500;
                const rotationStartTime = Date.now();

                function animateGlobeRotation() {
                    const elapsed = Date.now() - rotationStartTime;
                    const progress = Math.min(elapsed / rotationDuration, 1);
                    const ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                    earthGroup.rotation.y = startRotationY + angleToRotate * ease;
                    if (progress < 1) requestAnimationFrame(animateGlobeRotation);
                    else _animateToSectionAndShowContent(satellite, antenna, sectionToActivate);
                }
                animateGlobeRotation();
            }
        }

        function _animateToSectionAndShowContent(satellite, antenna, section) {
            connections.forEach(conn => {
                scene.remove(conn.line);
                if (conn.trail) conn.trail.forEach(p => scene.remove(p));
            });
            connections = [];
            trailParticles = [];

            const startPoint = satellite.position.clone();
            const antennaWorldPosition = new THREE.Vector3();
            antenna.getWorldPosition(antennaWorldPosition);
            const endPoint = antennaWorldPosition.clone();

            const midPointBetween = new THREE.Vector3().lerpVectors(startPoint, endPoint, 0.5);
            const arcHeightFactor = startPoint.distanceTo(endPoint) * 0.25;
            const controlPoint = midPointBetween.normalize().multiplyScalar(GLOBE_RADIUS + 3 + arcHeightFactor);

            const curve = new THREE.QuadraticBezierCurve3(startPoint, controlPoint, endPoint);
            const pathPoints = curve.getPoints(50);

            const lineGeometry = new THREE.BufferGeometry().setFromPoints(pathPoints);
            const connection = new THREE.Line(lineGeometry, new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 }));
            scene.add(connection);

            const beamTraveler = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 1 })
            );
            scene.add(beamTraveler);

            const trailArray = [];
            for (let i = 0; i < 20; i++) {
                const trailMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08, 8, 8),
                    new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0 })
                );
                scene.add(trailMesh);
                trailArray.push({ mesh: trailMesh, maxOpacity: 0.6 - (i * 0.03) });
            }

            connections.push({
                line: connection,
                satellite: satellite,
                antenna: antenna,
                traveler: beamTraveler,
                curve: curve,
                trail: trailArray.map(t => t.mesh)
            });

            trailParticles = trailArray;

            const targetCameraPosition = satellite.position.clone().normalize().multiplyScalar(GLOBE_RADIUS + 5);
            animateCamera(targetCameraPosition, () => {
                const currentConn = connections[connections.length - 1];
                if (currentConn && currentConn.traveler && currentConn.curve) {
                    animateBeamTraveler(currentConn.curve, currentConn.traveler, section, showContent);
                } else {
                    showContent(section);
                }
            });
        }

        function animateBeamTraveler(curve, traveler, section, finalCallback) {
            beamTravelerAnimationProgress = 0;
            beamTravelerStartTime = Date.now();
            isBeamAnimating = true;
            traveler.position.copy(curve.getPointAt(0));

            document.getElementById('contentOverlay').style.display = 'none';

            function animateBeam() {
                if (!isBeamAnimating) return;

                const elapsed = Date.now() - beamTravelerStartTime;
                beamTravelerAnimationProgress = Math.min(elapsed / BEAM_ANIMATION_DURATION, 1);

                const travelerCurrentPos = curve.getPointAt(beamTravelerAnimationProgress);
                traveler.position.copy(travelerCurrentPos);

                trailParticles.forEach((particle, index) => {
                    const delay = index * 0.03;
                    const particleProgress = Math.max(0, beamTravelerAnimationProgress - delay);
                    if (particleProgress > 0 && particleProgress <= 1) {
                        particle.mesh.position.copy(curve.getPointAt(particleProgress));
                        const fadeIn = 0.1, fadeOutStart = 0.7;
                        if (particleProgress < fadeIn) {
                            particle.mesh.material.opacity = (particleProgress / fadeIn) * particle.maxOpacity;
                        } else if (particleProgress > fadeOutStart) {
                            particle.mesh.material.opacity = particle.maxOpacity * (1 - (particleProgress - fadeOutStart) / (1 - fadeOutStart));
                        } else {
                            particle.mesh.material.opacity = particle.maxOpacity;
                        }
                    } else {
                        particle.mesh.material.opacity = 0;
                    }
                });

                const nextPoint = curve.getPointAt(Math.min(beamTravelerAnimationProgress + 0.01, 1));
                const direction = new THREE.Vector3().subVectors(nextPoint, travelerCurrentPos).normalize();
                const cameraTargetPosition = new THREE.Vector3().copy(travelerCurrentPos)
                    .sub(direction.multiplyScalar(3))
                    .add(new THREE.Vector3(0, 1.5, 0));
                camera.position.lerp(cameraTargetPosition, 0.1);
                camera.lookAt(travelerCurrentPos);

                if (beamTravelerAnimationProgress < 1) {
                    requestAnimationFrame(animateBeam);
                } else {
                    isBeamAnimating = false;
                    if (traveler && traveler.parent) scene.remove(traveler);
                    trailParticles.forEach(p => { p.mesh.material.opacity = 0; });
                    if (finalCallback) finalCallback(section);
                }
            }
            animateBeam();
        }

        function animateCamera(targetPosition, callback) {
            const startPosition = camera.position.clone();
            const duration = 1000;
            const startTime = Date.now();

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                camera.position.lerpVectors(startPosition, targetPosition, ease);
                camera.lookAt(0, 0, 0);
                if (progress < 1) requestAnimationFrame(animate);
                else if (callback) callback();
            }
            animate();
        }

        function showContent(section) {
            const content = contentData[section];
            if (content) {
                document.getElementById('contentBody').innerHTML = content.content;
                const overlay = document.getElementById('contentOverlay');
                overlay.style.display = 'flex';
                // Re-trigger animation
                const panel = document.getElementById('contentPanel');
                panel.style.animation = 'none';
                panel.offsetHeight; // reflow
                panel.style.animation = 'panelIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both';
            }
        }

        // ============================================================
        // LOOP DE ANIMAÇÃO
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);

            if (isRotating && earthGroup) earthGroup.rotation.y -= 0.0008;

            const time = Date.now() * 0.001;
            satellites.forEach((satellite) => {
                if (isRotating) {
                    const orbitAngle = satellite.userData.initialAngle + time * satellite.userData.orbitSpeed;
                    const orbitRadius = satellite.userData.orbitRadius;
                    satellite.position.x = Math.cos(orbitAngle) * orbitRadius;
                    satellite.position.y = Math.sin(orbitAngle) * orbitRadius * 0.3 + Math.sin(time * 2 + satellite.userData.initialAngle) * 0.5;
                    satellite.position.z = Math.sin(orbitAngle) * orbitRadius;
                    satellite.rotation.x += 0.0005;
                    satellite.rotation.y += 0.0008;
                }

                // Efeito de aproximação suave quando focado pelo nav
                if (satellite.userData.navFocused) {
                    const pulse = 1 + 0.08 * Math.sin(time * 4);
                    satellite.scale.setScalar(pulse);
                    // Puxar levemente em direção à câmera
                    const toCamera = camera.position.clone().sub(satellite.position).normalize();
                    satellite.position.addScaledVector(toCamera, 0.018);
                } else {
                    satellite.scale.lerp(new THREE.Vector3(1,1,1), 0.12);
                }
            });

            connections.forEach(conn => {
                conn.line.material.opacity = 0.5 + Math.sin(Date.now() * 0.005) * 0.3;
            });

            const t2 = Date.now() * 0.002;
            antennaPulses.forEach((pulse, index) => {
                const pulseDuration = 4.0;
                const scale = (t2 + index * 0.7) % pulseDuration;
                pulse.scale.set(scale, scale, scale);
                pulse.material.opacity = Math.pow(1.0 - (scale / pulseDuration), 2);
            });

            renderer.render(scene, camera);
        }

        // Ano dinâmico no footer
        document.getElementById('footerYear').textContent = new Date().getFullYear();

        // ============================================================
        // URGÊNCIA CONDICIONAL POR SERVIÇO
        // ============================================================
        const SERVICOS_COM_URGENCIA = ['Resposta_Incidentes', 'Recuperacao_Sistemas'];
        let urgenciaHabilitada = false;

        window.handleServicoChange = function(value) {
            const container = document.getElementById('urgenciaContainer');
            const check = document.getElementById('urgenciaCheck');
            const field = document.getElementById('urgenciaField');
            if (!container) return;

            if (SERVICOS_COM_URGENCIA.includes(value)) {
                urgenciaHabilitada = true;
                container.style.opacity = '1';
                container.style.cursor = 'pointer';
                container.style.background = 'rgba(255,80,80,0.07)';
                container.style.borderColor = 'rgba(255,80,80,0.3)';
                container.querySelector('div:last-child div:first-child').style.color = '#ff8888';
                container.querySelector('div:last-child div:last-child').style.color = '#995555';
                check.style.borderColor = '#ff5555';
            } else {
                urgenciaHabilitada = false;
                urgenciaAtiva = false;
                container.style.opacity = '0.45';
                container.style.cursor = 'not-allowed';
                container.style.background = 'rgba(100,100,100,0.07)';
                container.style.borderColor = 'rgba(100,100,100,0.25)';
                container.querySelector('div:last-child div:first-child').style.color = '#888';
                container.querySelector('div:last-child div:last-child').style.color = '#666';
                check.style.borderColor = '#666';
                check.innerHTML = '';
                check.style.background = 'transparent';
                if (field) field.value = 'Não';
            }
        };

        // ============================================================
        // CARDS EXPANSÍVEIS
        // ============================================================
        window.toggleCard = function(card) {
            const isOpen = card.classList.contains('open');
            // Fechar todos
            document.querySelectorAll('.service-card.open').forEach(c => c.classList.remove('open'));
            // Abrir o clicado (se estava fechado)
            if (!isOpen) card.classList.add('open');
        };

        // ============================================================
        // URGÊNCIA NO FORMULÁRIO
        // ============================================================
        let urgenciaAtiva = false;

        window.toggleUrgencia = function(container) {
            if (!urgenciaHabilitada) return;
            urgenciaAtiva = !urgenciaAtiva;
            const check = document.getElementById('urgenciaCheck');
            const field = document.getElementById('urgenciaField');
            if (urgenciaAtiva) {
                check.innerHTML = '✓';
                check.style.background = '#ff5555';
                check.style.color = '#fff';
                check.style.fontSize = '14px';
                check.style.fontWeight = 'bold';
                container.style.background = 'rgba(255,80,80,0.15)';
                container.style.borderColor = 'rgba(255,80,80,0.6)';
                field.value = 'SIM';
            } else {
                check.innerHTML = '';
                check.style.background = 'transparent';
                container.style.background = 'rgba(255,80,80,0.07)';
                container.style.borderColor = 'rgba(255,80,80,0.3)';
                field.value = 'Não';
            }
        };

        window.setSubject = function() {
            const subjectField = document.getElementById('emailSubject');
            if (subjectField) {
                subjectField.value = urgenciaAtiva
                    ? '[URGÊNCIA] Novo Orçamento — ANPLASEC'
                    : 'Novo Orçamento — ANPLASEC';
            }
        };

        init();
    </script>
